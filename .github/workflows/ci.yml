name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: "pip"
          cache-dependency-path: requirements-dev.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Smoke test install.sh
        run: |
          bash install.sh
          test -f "$HOME/.claude/code-pal/statusline.py" || (echo "statusline.py missing" && exit 1)
          test -f "$HOME/.claude/code-pal/config.json"   || (echo "config.json missing" && exit 1)
          test -f "$HOME/.claude/settings.json"           || (echo "settings.json missing" && exit 1)
          grep -q "statusLine" "$HOME/.claude/settings.json" || (echo "statusLine not wired" && exit 1)
          bash install.sh --uninstall
          test ! -d "$HOME/.claude/code-pal" || (echo "uninstall left files behind" && exit 1)

      - name: Run tests
        run: python3 -m pytest tests/

  test-node:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node-version: ["20", "22"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Type check
        run: npm run typecheck

      - name: Run Jest tests
        run: npm test

      - name: Validate cold start <100ms
        run: |
          START=$(date +%s%3N)
          node dist/statusline.js
          END=$(date +%s%3N)
          MS=$((END - START))
          echo "Cold start: ${MS}ms"
          if [ "$MS" -gt 100 ]; then
            echo "FAIL: cold start ${MS}ms exceeds 100ms threshold"
            exit 1
          fi
          echo "PASS: cold start ${MS}ms"

      - name: Smoke test setup script
        if: matrix.node-version == '20'
        run: |
          npm run setup
          test -f "$HOME/.claude/code-pal/dist/statusline.js" || (echo "setup did not install dist/statusline.js" && exit 1)
          test -f "$HOME/.claude/code-pal/package.json" || (echo "setup did not install package.json" && exit 1)
          node "$HOME/.claude/code-pal/dist/statusline.js" || (echo "installed statusline.js failed to run" && exit 1)
          npm run unsetup
          test ! -d "$HOME/.claude/code-pal" || (echo "unsetup left files behind" && exit 1)
